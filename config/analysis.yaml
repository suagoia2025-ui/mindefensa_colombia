# Configuración del Módulo de Análisis
# Análisis de Seguridad Colombia

analysis:
  # Datos de entrada
  input:
    maestro_path: "data/processed/eventos_seguridad_maestro"
    # Busca .parquet o .csv según disponibilidad

  # Rangos por defecto
  default_filters:
    min_year: 2003
    max_year: 2030

  # Parámetros de análisis
  tendencias:
    min_anos_para_tendencia: 3

  concentracion:
    top_n_departamentos: 10
    top_n_municipios: 50

  estacionalidad:
    meses_nombres:
      - Enero
      - Febrero
      - Marzo
      - Abril
      - Mayo
      - Junio
      - Julio
      - Agosto
      - Septiembre
      - Octubre
      - Noviembre
      - Diciembre
