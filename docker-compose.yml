services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analisis-defensa-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analisis-defensa-frontend
    ports:
      - "80:80"
    depends_on:
      - api
