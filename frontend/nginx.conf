server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API al backend (timeouts largos: consultas con muchos años pueden tardar minutos)
    # Resolver 127.0.0.11 = DNS embebido de Docker; set + variable evita "host not found in
    # upstream" si nginx arranca antes de que el contenedor api esté resoluble.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
